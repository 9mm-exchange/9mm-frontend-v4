name: Docker Build and Push

on:
  push:
    branches:
      - docker
      - 'docker/**'
  pull_request:
    branches:
      - docker
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        df -h

    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: spiritmonkey/dex
        tags: |
          type=raw,value=latest
          type=sha,prefix=
          type=raw,value={{date 'YYYYMMDD-HHmmss'}}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NODE_OPTIONS=--max-old-space-size=8192
          NEXT_PUBLIC_SNAPSHOT_BASE_URL=https://hub.snapshot.org
          NEXT_PUBLIC_EXPLORE_API_ENDPOINT=/api
          NEXT_PUBLIC_SENTRY_DSN=https://9b2da63c55645f13b6035e91d06347af@o4510433552891904.ingest.de.sentry.io/4510435212525648
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

    - name: Image digest
      run: echo "Image pushed with tags - ${{ steps.meta.outputs.tags }}"

    # Deploy to Kubernetes
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Restart Kubernetes Deployment
      run: |
        kubectl rollout restart deployment/dex -n ninemm-frontend
        kubectl rollout status deployment/dex -n ninemm-frontend --timeout=180s

