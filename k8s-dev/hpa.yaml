apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dex-main
  namespace: ninemm-frontend-dev
  labels:
    app: dex-main
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dex-main
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
