apiVersion: v1
kind: ConfigMap
metadata:
  name: ninemm-frontend-config
  namespace: ninex
data:
  # Non-sensitive configuration
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  
  # API URLs (non-sensitive)
  NEXT_PUBLIC_MM_API_URL: "https://linked-pool.pancakeswap.com/quote-service"
  NEXT_PUBLIC_QUOTING_API: "https://swap-quoting.pancakeswap.com/quoting-service"
  
  # PulseChain RPC Configuration
  # NEXT_PUBLIC_ = browser-facing (public HTTPS)
  # SERVER_ = server-side only (private IP for low latency)
  NEXT_PUBLIC_PULSECHAIN_RPC: "https://rpc.9mm.pro"
  SERVER_PULSECHAIN_RPC: "http://192.168.226.228:8545"
  NEXT_PUBLIC_PULSECHAIN_WS: "wss://rpc.9mm.pro"
